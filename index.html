<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kundalik Tracker</title>

<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
background:#f5f3ef;
padding:20px;
color:#1d1d1f;
}

.container{
max-width:1200px;
margin:auto;
background:white;
border-radius:28px;
padding:28px;
box-shadow:0 10px 40px rgba(0,0,0,0.05);
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.title{
font-size:40px;
font-weight:700;
}

.month{
font-size:24px;
color:#666;
}

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px;
margin-bottom:35px;
}

.card{
background:#f7f7f7;
padding:22px;
border-radius:20px;
}

.card h1{
font-size:42px;
margin-bottom:8px;
}

.card p{
color:#666;
font-size:15px;
}

.progress{
margin-bottom:35px;
}

.progress-item{
margin-bottom:18px;
}

.progress-label{
display:flex;
justify-content:space-between;
margin-bottom:8px;
font-size:15px;
}

.bar{
height:12px;
background:#ececec;
border-radius:999px;
overflow:hidden;
}

.fill{
height:100%;
width:0%;
background:#7c5cff;
border-radius:999px;
transition:0.3s;
}

.grid{
overflow-x:auto;
}

.days{
display:grid;
grid-template-columns:200px repeat(31,40px);
gap:10px;
align-items:center;
margin-bottom:14px;
min-width:1600px;
}

.day-number{
text-align:center;
font-weight:600;
color:#777;
}

.habit{
font-size:18px;
font-weight:500;
}

.circle{
width:26px;
height:26px;
border-radius:50%;
border:2px solid #d1d1d1;
cursor:pointer;
transition:0.2s;
margin:auto;
}

.circle.active{
background:#7c5cff;
border-color:#7c5cff;
transform:scale(1.05);
}

.section-title{
font-size:26px;
font-weight:700;
margin-bottom:20px;
}

@media(max-width:768px){

body{
padding:12px;
}

.container{
padding:18px;
border-radius:24px;
}

.title{
font-size:32px;
}

.month{
font-size:18px;
}

.stats{
grid-template-columns:1fr 1fr;
}

.card h1{
font-size:34px;
}

.days{
grid-template-columns:140px repeat(31,34px);
gap:8px;
}

.habit{
font-size:15px;
}

.circle{
width:22px;
height:22px;
}

}

</style>
</head>
<body>

<div class="container">

<div class="top">
<div class="title">Kundalik Tracker</div>
<div class="month">2026 may</div>
</div>

<div class="stats">

<div class="card">
<h1 id="doneCount">0</h1>
<p>Bajarilgan</p>
</div>

<div class="card">
<h1 id="streak">0</h1>
<p>Izchillik</p>
</div>

<div class="card">
<h1 id="percent">0%</h1>
<p>Foiz</p>
</div>

<div class="card">
<h1 id="today">0/11</h1>
<p>Bugun</p>
</div>

</div>

<div class="progress">

<div class="progress-item">
<div class="progress-label">
<span>Uyqu</span>
<span id="sleepPercent">0%</span>
</div>
<div class="bar">
<div class="fill" id="sleepBar"></div>
</div>
</div>

<div class="progress-item">
<div class="progress-label">
<span>Ingliz tili</span>
<span id="engPercent">0%</span>
</div>
<div class="bar">
<div class="fill" id="engBar"></div>
</div>
</div>

<div class="progress-item">
<div class="progress-label">
<span>Kurs</span>
<span id="coursePercent">0%</span>
</div>
<div class="bar">
<div class="fill" id="courseBar"></div>
</div>
</div>

</div>

<div class="section-title">May oyi</div>

<div class="grid" id="grid"></div>

</div>

<script>

const habits = [
"23:00 uxlash",
"07:30 turish",
"Ingliz tili",
"So'z takrorlash",
"Kurs darsi",
"Montaj",
"Kurs takrorlash",
"Loyiha/Ish",
"Syomka",
"Sport",
"Telefonsiz dam"
];

const days = 31;

const grid = document.getElementById("grid");

function createGrid(){

let header = document.createElement("div");
header.className = "days";

header.innerHTML = `<div></div>`;

for(let d=1; d<=days; d++){
header.innerHTML += `<div class="day-number">${d}</div>`;
}

grid.appendChild(header);

habits.forEach((habit,index)=>{

let row = document.createElement("div");
row.className = "days";

row.innerHTML = `<div class="habit">${habit}</div>`;

for(let d=1; d<=days; d++){

row.innerHTML += `
<div 
class="circle"
onclick="toggle(this)">
</div>
`;

}

grid.appendChild(row);

});

}

function toggle(el){

el.classList.toggle("active");

updateStats();

}

function updateStats(){

const active = document.querySelectorAll(".circle.active").length;

const total = document.querySelectorAll(".circle").length;

document.getElementById("doneCount").innerText = active;

let percent = Math.round((active/total)*100);

document.getElementById("percent").innerText = percent + "%";

document.getElementById("today").innerText = active + "/11";

document.getElementById("sleepBar").style.width = percent + "%";
document.getElementById("engBar").style.width = percent + "%";
document.getElementById("courseBar").style.width = percent + "%";

document.getElementById("sleepPercent").innerText = percent + "%";
document.getElementById("engPercent").innerText = percent + "%";
document.getElementById("coursePercent").innerText = percent + "%";

}

createGrid();

</script>

</body>
</html>
